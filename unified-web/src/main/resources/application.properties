server.port=8083
spring.application.name=unified-analyzer

# ══════════════════════════════════════════════════════════════
# Dynamic directories — pass any path at startup:
#   java -jar app.jar --app.config-dir=/my/config --app.data-dir=/my/data
#
# config-dir: plsql-config.yaml, domain-config.json, prompts/*.txt
# data-dir:   data/jar/ (JAR analyzer), data/plsql/ (PL/SQL), logs
# ══════════════════════════════════════════════════════════════
app.config-dir=config
app.data-dir=data

# ══════════════════════════════════════════════════════════════
# JAR Analyzer settings
# ══════════════════════════════════════════════════════════════

spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
spring.jackson.serialization.indent-output=false
server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=1024
spring.mvc.async.request-timeout=-1

# Claude CLI analysis config
claude.analysis.max-endpoints=-1
claude.analysis.parallel-chunks=5
claude.allowed-tools=Read,Grep,Glob,Bash,Write,Edit

# Call tree building limits
calltree.max-depth=20
calltree.max-children-per-node=30
calltree.max-nodes-per-tree=2000

# Chunking / prompt size limits
claude.chunking.max-chunk-chars=50000
claude.chunking.max-tree-nodes=500
claude.chunking.max-chunk-depth=3
claude.chunking.max-prompt-chars=180000

# Timeout configuration (seconds)
claude.timeout.per-endpoint=7200
claude.timeout.version-check=30
claude.timeout.stream-drain=3000
claude.timeout.executor-shutdown=60
mongo.timeout.connect=30
mongo.timeout.server-selection=30

# ══════════════════════════════════════════════════════════════
# PL/SQL Analyzer settings
# ══════════════════════════════════════════════════════════════

server.tomcat.max-http-form-post-size=50MB

# Disable auto DataSource (PL/SQL manages connections manually)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

plsql.threads.source-fetch=8
plsql.threads.trigger-resolve=4
plsql.threads.metadata=4
plsql.threads.claude-parallel=5
plsql.tree.max-depth=50
plsql.tree.max-nodes=2000

# PL/SQL Parser config path (for flow analysis DB connection)
app.parser-config-path=config/plsql-config.yaml

# ══════════════════════════════════════════════════════════════
# Claude CLI authentication
# By default uses local `claude login` credentials (no env vars needed).
# To use AWS Bedrock: set claude.bedrock.enabled=true and configure profile/region.
# ══════════════════════════════════════════════════════════════
claude.bedrock.enabled=false
claude.bedrock.profile=ClaudeCode
claude.bedrock.region=eu-central-1

# ══════════════════════════════════════════════════════════════
# Chat configuration
# chat.classic.enabled — enable/disable the Classic (session-based) chat panel
# chat.chatbox.enabled — enable/disable the new floating AI chatbox (JAR-specific)
# Both can be enabled simultaneously; user toggles between them on the JAR page.
# ══════════════════════════════════════════════════════════════
chat.classic.enabled=true
chat.chatbox.enabled=true

# ══════════════════════════════════════════════════════════════
# Static resource caching (disabled for dev — browser gets fresh files)
# ══════════════════════════════════════════════════════════════
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true

# ══════════════════════════════════════════════════════════════
# Tomcat tuning — limit idle threads to reduce memory footprint
# ══════════════════════════════════════════════════════════════
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=4
server.tomcat.connection-timeout=60s

# ══════════════════════════════════════════════════════════════
# Logging
# ══════════════════════════════════════════════════════════════

logging.file.name=data/unified-analyzer.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10
logging.logback.rollingpolicy.file-name-pattern=data/unified-analyzer.%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.total-size-cap=500MB
logging.logback.rollingpolicy.clean-history-on-start=true
